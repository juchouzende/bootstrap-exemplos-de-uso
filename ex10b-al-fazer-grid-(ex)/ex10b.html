<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Promoções da Loja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Centralizar o carrossel */
        .carousel-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }
        .carousel-inner img {
            margin: auto;
        }
    </style>
</head>
<body>

    <!-- 1ª Digitação -->

<!-- ALERTA DINÂMICO -->
<div class="container mt-3">
    <div class="alert alert-success alert-dismissible fade show text-center" role="alert">
         Promoção ativa! Aproveite descontos exclusivos hoje!
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<!-- NAVBAR RESPONSIVA -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Loja Online</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="#">Início</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Ofertas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Contato</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- CARROSSEL -->
<div class="carousel-container">
    <div id="carouselExample" class="carousel slide w-75" data-bs-ride="carousel">

        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="https://picsum.photos/800/300?1" class="d-block w-100" alt="Promoção 1">
            </div>

            <div class="carousel-item">
                <img src="https://picsum.photos/800/300?2" class="d-block w-100" alt="Promoção 2">
            </div>

            <div class="carousel-item">
                <img src="https://picsum.photos/800/300?3" class="d-block w-100" alt="Promoção 3">
            </div>

        </div>

        <!-- Controles -->
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>

    </div>
</div>

<!-- BARRA DE PROGRESSO -->
<div class="container mt-5 text-center">
    <h5>Desbloqueie seu desconto</h5>

    <div class="progress mb-3" style="height: 25px;">
        <div id="progress-bar" class="progress-bar bg-success" style="width: 0%;">
            0%
        </div>
    </div>

    <button id="increase-progress" class="btn btn-primary">
        Concluir progresso
    </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('increase-progress').addEventListener('click', function() {
        let progressBar = document.getElementById('progress-bar');
        let width = parseInt(progressBar.style.width);
        
        if (width < 100) {
            width += 20;
            progressBar.style.width = width + "%";
            progressBar.textContent = width + "%";

            if (width === 100) {
                alert("🎉 Parabéns! Você desbloqueou um desconto especial!");
            }
        }
    });
</script>

</body>
</html>
