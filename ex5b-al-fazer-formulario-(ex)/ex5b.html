 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Moderno</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 300px;
        }

        .form-control {
            border-radius: 10px;
            padding-left: 40px;
            transition: all 0.3s ease;
            height: 50px;
        }

        .form-control:focus {
            box-shadow: 0 0 0 2px rgba(13,110,253,0.2);
            border-color: #0d6efd;
        }

        .input-group-text {
            height: 50px;
            display: flex;
            align-items: center;
            border-radius: 10px 0 0 10px;
            background: #f1f3f5;
            border-right: none;
        }

        .btn-custom {
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h4 class="mb-4 text-center">Login</h4>

        <form>
            <!-- Email -->
            <div class="input-group mb-3">
            <span class="input-group-text">
                <i class="bi bi-envelope" style="color: #6f42c1;"></i>
            </span>
            <input type="email" class="form-control" placeholder="Coloque seu email">
            </div>

            <!-- Senha -->
            <div class="input-group mb-4">
            <span class="input-group-text">
                <i class="bi bi-lock" style="color: #6f42c1;"></i>
            </span>
            <input type="password" class="form-control" placeholder="Coloque sua senha">
            </div>

            <!-- Botão -->
            <button class="btn btn-success w-100 btn-custom">
                Entrar <i class="bi bi-arrow-right"></i>
            </button>
        </form>
    </div>

</body>
</html>
