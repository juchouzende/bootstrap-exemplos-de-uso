<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Exemplo de uso de Card -->
 <div class="container mt-3">
  <div class="row">

    <!-- Card -->
     <div class="card" style="width: 340px;">
      <div class="card-body" >
        <img src="../Sabrina.png" alt="Foto de algo" style="border-radius: 20px;">
        <p class="card-text">Exemplo de texto no card do Bootstrap</p>
        <a href="#" class="btn btn-secondary">Botão</a>
      </div>
     </div>

  </div>
 </div>
 
 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
